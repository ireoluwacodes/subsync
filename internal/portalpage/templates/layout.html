{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — {{.TenantName}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #14110f;
      --ink-soft: #4a443c;
      --ink-muted: #7a7268;
      --paper: #f7f3ec;
      --paper-deep: #efe8dc;
      --surface: #fffcf7;
      --line: rgba(20, 17, 15, 0.08);
      --accent: #b45309;
      --accent-hover: #92400e;
      --accent-soft: rgba(180, 83, 9, 0.1);
      --success: #166534;
      --success-soft: #dcfce7;
      --warn: #a16207;
      --warn-soft: #fef3c7;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --shadow: 0 18px 50px rgba(20, 17, 15, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(180, 83, 9, 0.12), transparent 60%),
        linear-gradient(180deg, var(--paper) 0%, #f3ede4 100%);
    }

    .shell {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.5rem 1rem 2.5rem;
      animation: rise 0.55s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding: 0 .15rem;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      font-family: "Fraunces", Georgia, serif;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .brand-mark::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #d97706);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .brand-tenant {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      text-align: right;
      max-width: 55%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.35rem 1.25rem;
      box-shadow: var(--shadow);
      margin-bottom: .85rem;
    }

    .card + .card { margin-top: .85rem; }

    h1, h2 {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin: 0;
      color: var(--ink);
    }

    h1 { font-size: 1.65rem; }
    h2 { font-size: 1.1rem; margin-bottom: .35rem; }

    .eyebrow {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: .45rem;
    }

    .muted {
      color: var(--ink-muted);
      font-size: .92rem;
      margin: .35rem 0 0;
    }

    .lead {
      color: var(--ink-soft);
      font-size: .95rem;
      margin: .75rem 0 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .28rem .65rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--paper-deep);
      color: var(--ink-soft);
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: .65;
    }

    .badge.ok { background: var(--success-soft); color: var(--success); }
    .badge.warn { background: var(--warn-soft); color: var(--warn); }
    .badge.danger { background: var(--danger-soft); color: var(--danger); }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: .5rem;
      margin-top: .85rem;
    }

    .callout {
      margin-top: 1rem;
      padding: .85rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(180, 83, 9, 0.18);
      background: linear-gradient(180deg, rgba(255, 251, 245, 0.95), rgba(254, 243, 199, 0.35));
      font-size: .9rem;
      color: var(--ink-soft);
    }

    .callout strong { color: var(--ink); }

    .detail-grid {
      display: grid;
      gap: .65rem;
      margin-top: 1rem;
    }

    .detail {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: .7rem .85rem;
      border-radius: var(--radius-sm);
      background: var(--paper);
      border: 1px solid var(--line);
      font-size: .9rem;
    }

    .detail span:first-child { color: var(--ink-muted); }
    .detail span:last-child { font-weight: 600; text-align: right; word-break: break-all; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      margin-top: 1rem;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: .82rem 1rem;
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-weight: 700;
      font-size: .94rem;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(180deg, #c2410c, var(--accent));
      color: #fff;
      box-shadow: 0 10px 24px rgba(180, 83, 9, 0.22);
    }

    .btn-primary:hover { box-shadow: 0 14px 28px rgba(180, 83, 9, 0.28); }

    .btn-secondary {
      background: var(--surface);
      color: var(--accent);
      border: 1.5px solid rgba(180, 83, 9, 0.28);
    }

    .btn-danger {
      background: var(--surface);
      color: var(--danger);
      border: 1px solid rgba(185, 28, 28, 0.18);
    }

    .flash {
      display: flex;
      align-items: flex-start;
      gap: .65rem;
      padding: .85rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: .85rem;
      font-size: .9rem;
      border: 1px solid transparent;
    }

    .flash::before {
      content: "✓";
      font-weight: 700;
      flex-shrink: 0;
    }

    .flash.ok {
      background: var(--success-soft);
      color: var(--success);
      border-color: rgba(22, 101, 52, 0.12);
    }

    .flash.err {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(185, 28, 28, 0.12);
    }

    .flash.err::before { content: "!"; }

    label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: .35rem;
    }

    input {
      width: 100%;
      padding: .72rem .85rem;
      border: 1px solid rgba(20, 17, 15, 0.12);
      border-radius: var(--radius-sm);
      margin-bottom: .9rem;
      font: inherit;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(180, 83, 9, 0.45);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .field-hint {
      margin: -.55rem 0 .85rem;
      font-size: .82rem;
      color: var(--ink-muted);
    }

    .instructions {
      background: var(--paper);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem 1rem 1rem 1.1rem;
      font-size: .9rem;
      white-space: pre-wrap;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 1.15rem 0;
    }

    .footer {
      margin-top: 1.25rem;
      text-align: center;
      font-size: .75rem;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .outcome-hero {
      text-align: center;
      padding: .25rem 0 .15rem;
    }

    .outcome-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto .85rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--paper-deep);
      color: var(--ink-soft);
    }

    .outcome-hero.success .outcome-icon { background: var(--success-soft); color: var(--success); }
    .outcome-hero.pending .outcome-icon { background: var(--warn-soft); color: var(--warn); }
    .outcome-hero.failed .outcome-icon { background: var(--danger-soft); color: var(--danger); }

    .pulse {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-size: .82rem;
      color: var(--ink-muted);
      margin-top: .85rem;
    }

    .pulse::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .45; transform: scale(0.85); }
    }

    .section-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      margin-bottom: .5rem;
    }

    @media (max-width: 420px) {
      h1 { font-size: 1.45rem; }
      .shell { padding-top: 1rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="brand">
      <div class="brand-mark">Billing</div>
      {{if .TenantName}}<div class="brand-tenant">{{.TenantName}}</div>{{end}}
    </header>

    {{if .FlashMessage}}<div class="flash ok">{{.FlashMessage}}</div>{{end}}
    {{if .FlashError}}<div class="flash err">{{.FlashError}}</div>{{end}}

    {{template "content" .}}

    <footer class="footer">Secured checkout · SubSync</footer>
  </div>
</body>
</html>
{{end}}

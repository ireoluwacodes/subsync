{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} — {{.TenantName}}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f6f7f9; color: #1a1a1a; line-height: 1.5; }
    .wrap { max-width: 560px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1rem; }
    h1 { font-size: 1.35rem; margin: 0 0 .25rem; }
    .muted { color: #666; font-size: .9rem; }
    .badge { display: inline-block; padding: .2rem .55rem; border-radius: 999px; font-size: .75rem; font-weight: 600; text-transform: uppercase; background: #e8f0fe; color: #1a56db; }
    .badge.warn { background: #fef3cd; color: #856404; }
    .badge.ok { background: #d4edda; color: #155724; }
    .actions { display: flex; flex-direction: column; gap: .75rem; margin-top: 1.25rem; }
    .btn { display: block; text-align: center; padding: .75rem 1rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: .95rem; border: none; cursor: pointer; }
    .btn-primary { background: #1a56db; color: #fff; }
    .btn-secondary { background: #fff; color: #1a56db; border: 2px solid #1a56db; }
    .btn-danger { background: #fff; color: #c0392b; border: 1px solid #e0e0e0; }
    .flash { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    .flash.ok { background: #d4edda; color: #155724; }
    .flash.err { background: #f8d7da; color: #721c24; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .25rem; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #ccc; border-radius: 6px; margin-bottom: .85rem; font-size: 1rem; }
    .instructions { background: #f8f9fa; border-left: 4px solid #1a56db; padding: 1rem; font-size: .9rem; white-space: pre-wrap; }
    hr { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }
  </style>
</head>
<body>
  <div class="wrap">
    {{if .FlashMessage}}<div class="flash ok">{{.FlashMessage}}</div>{{end}}
    {{if .FlashError}}<div class="flash err">{{.FlashError}}</div>{{end}}
    {{template "content" .}}
  </div>
</body>
</html>
{{end}}

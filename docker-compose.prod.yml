services:
  redis:
    image: redis:7-alpine
    container_name: subsync-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/ireoluwacodes/subsync-api:latest
    container_name: subsync-api
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      HTTP_PORT: "8080"
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/ireoluwacodes/subsync-worker:latest
    container_name: subsync-worker
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:latest
    container_name: subsync-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

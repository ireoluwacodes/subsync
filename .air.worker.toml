#:schema https://json.schemastore.org/any.json
# Worker live reload — run: make air-worker

env_files = [".env"]
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/worker ./cmd/worker"
  entrypoint = ["./tmp/worker"]
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin", "postman", "migrations", ".git", ".github"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  log = "tmp/build-errors-worker.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = true
  keep_scroll = true
